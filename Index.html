<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Crédito para Pensionados IMSS Ley 73</title>
    <meta name="description" content="Calcula en segundos el monto estimado de tu crédito de nómina como pensionado IMSS Ley 73. Asesoría personalizada por WhatsApp.">
    <!-- Open Graph: para que se vea bien al compartir en Facebook/WhatsApp/TikTok -->
    <meta property="og:title" content="Calculadora de Crédito para Pensionados IMSS Ley 73">
    <meta property="og:description" content="Descubre en segundos tu monto estimado de crédito. Sin aval, con descuento directo de tu pensión.">
    <meta property="og:type" content="website">
    <style>
        :root {
            --primary-color: #0b2343;
            --secondary-color: #1a4473;
            --accent-color: #25d366;
            --text-color: #333333;
            --bg-color: #f4f7f9;
            --error-color: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .calculator-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-top: 8px solid var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 16px;
            color: var(--secondary-color);
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px 15px 15px 35px;
            font-size: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--secondary-color);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 6px;
            min-height: 16px;
        }

        .result-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0 25px;
        }

        .result-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .result-amount {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
            background-color: #20ba59;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>Calculadora de Crédito</h1>
        <p>Exclusivo para Pensionados IMSS Ley 73</p>
    </div>

    <div class="form-group">
        <label for="pension">¿De cuánto es tu pensión mensual aprox.?</label>
        <div class="input-container">
            <span class="currency-symbol">$</span>
            <input type="number" id="pension" placeholder="Ej. 10000" min="0" max="200000" inputmode="numeric" oninput="calcularCredito()">
        </div>
        <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="result-box">
        <div class="result-title">Monto Estimado de Crédito</div>
        <div class="result-amount" id="monto-resultado">$0.00</div>
    </div>

    <a href="#" id="wa-link" class="btn-whatsapp" target="_blank" rel="noopener">
        💬 Solicitar este Monto por WhatsApp
    </a>

    <p class="footer-text">*Monto estimado sujeto a evaluación de capacidad de descuento y aprobación de crédito. No constituye una oferta vinculante.</p>
</div>

<script>
    // Número oficial en formato internacional completo (52 + 10 dígitos) para que wa.me funcione siempre
    const TELEFONO_OFICIAL = "5215653999251";

    // --- Parámetros reales de la tabla Consubanco ---
    const TASA_MENSUAL = 0.024;      // 2.40% mensual
    const PLAZO_MESES = 60;          // 60 meses
    const PORCENTAJE_MAX_DESCUENTO = 0.30; // 30% máximo de descuento sobre pensión
    // Factor de anualidad: (1 - (1+r)^-n) / r, precalculado para r=2.40%, n=60
    const FACTOR_ANUALIDAD = 31.63;

    const PENSION_MAX = 200000; // Tope razonable para evitar montos absurdos

    function calcularCredito() {
        const input = document.getElementById('pension');
        const errorMsg = document.getElementById('error-msg');
        let pension = parseFloat(input.value);

        errorMsg.textContent = "";

        if (isNaN(pension) || pension < 0) {
            pension = 0;
        }
        if (pension > PENSION_MAX) {
            errorMsg.textContent = "Verifica el monto ingresado.";
            pension = PENSION_MAX;
        }

        // Capacidad de pago mensual disponible para el crédito (30% de la pensión)
        // Nota: la prima de Vida Más ($400) se calcula por separado al prospectar al cliente
        const capacidadPago = pension * PORCENTAJE_MAX_DESCUENTO;

        const montoEstimado = capacidadPago * FACTOR_ANUALIDAD;

        const formateado = new Intl.NumberFormat('es-MX', {
            style: 'currency',
            currency: 'MXN'
        }).format(montoEstimado);

        document.getElementById('monto-resultado').innerText = formateado;

        let mensaje = "";
        if (pension > 0) {
            const pensionFormateada = new Intl.NumberFormat('es-MX', {
                style: 'currency', currency: 'MXN'
            }).format(pension);
            mensaje = `Hola, utilicé la calculadora de crédito. Mi pensión aproximada es de ${pensionFormateada} y mi monto estimado es de ${formateado}. Me interesa recibir una asesoría personalizada.`;
        } else {
            mensaje = `Hola, me interesa calcular mi crédito de nómina para pensionados. ¿Me podrías dar más información?`;
        }

        const waUrl = `https://wa.me/${TELEFONO_OFICIAL}?text=${encodeURIComponent(mensaje)}`;
        document.getElementById('wa-link').href = waUrl;
    }

    calcularCredito();
</script>

</body>
</html>
